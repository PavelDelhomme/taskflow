name: Build & Push Images

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/paveldelhomme

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./taskflow-api
          file: ./taskflow-api/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskflow-api:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/taskflow-api:${{ steps.meta.outputs.sha }}

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: ./taskflow-web
          file: ./taskflow-web/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.taskflow.delhomme.ovh' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/taskflow-web:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/taskflow-web:${{ steps.meta.outputs.sha }}

      - name: Tag latest on main
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}/taskflow-api:latest ${{ env.IMAGE_PREFIX }}/taskflow-api:main
          docker buildx imagetools create -t ${{ env.IMAGE_PREFIX }}/taskflow-web:latest ${{ env.IMAGE_PREFIX }}/taskflow-web:main
