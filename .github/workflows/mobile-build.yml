name: Mobile Build (APK release)

on:
  push:
    tags: ['mobile-v*']
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: taskflow-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check mobile project exists
        run: test -f pubspec.yaml

      - name: Build APK release
        run: |
          flutter pub get
          flutter build apk --release \
            --dart-define=API_URL=${{ vars.MOBILE_API_URL || 'https://api.taskflow.delhomme.ovh' }}

      - uses: actions/upload-artifact@v4
        with:
          name: taskflow-apk-release
          path: taskflow-mobile/build/app/outputs/flutter-apk/app-release.apk
