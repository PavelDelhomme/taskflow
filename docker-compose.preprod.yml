# TaskFlow — overrides préprod VPS (même hôte que prod possible : ports 401x)
# Portainer préprod : deploy/portainer/docker-compose.stack-preprod.yml (branche dev)

services:
  taskflow-db:
    container_name: taskflow-db-preprod
    ports:
      - "127.0.0.1:${DB_PUBLISH_PORT:-4012}:5432"
    volumes:
      - taskflow_postgres_data_preprod:/var/lib/postgresql/data
      - ./taskflow-api/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  taskflow-api:
    container_name: taskflow-api-preprod
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.taskflow.delhomme.ovh}
    ports:
      - "127.0.0.1:${API_PUBLISH_PORT:-4011}:8000"

  taskflow-web:
    container_name: taskflow-web-preprod
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-staging.taskflow.delhomme.ovh}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-staging.taskflow.delhomme.ovh}
    ports:
      - "127.0.0.1:${WEB_PUBLISH_PORT:-4010}:3000"

volumes:
  taskflow_postgres_data_preprod:
    name: taskflow_postgres_data_preprod
