# TaskFlow — overrides production (loopback NPM, images prod, sans volumes dev)
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Portainer prod : deploy/portainer/docker-compose.stack.yml

services:
  taskflow-db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    ports:
      - "127.0.0.1:${DB_PUBLISH_PORT:-4002}:5432"
    restart: always

  taskflow-api:
    image: ${IMAGE_REGISTRY:-ghcr.io/paveldelhomme}/taskflow-api:${IMAGE_TAG:-latest}
    build:
      context: ./taskflow-api
      dockerfile: Dockerfile.prod
    pull_policy: ${IMAGE_PULL_POLICY:-build}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskflow}:${POSTGRES_PASSWORD}@taskflow-db:5432/${POSTGRES_DB:-taskflow_adhd}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://taskflow.delhomme.ovh}
    volumes:
      - taskflow_api_data:/app/data
    ports:
      - "127.0.0.1:${API_PUBLISH_PORT:-4001}:8000"
    restart: always

  taskflow-web:
    image: ${IMAGE_REGISTRY:-ghcr.io/paveldelhomme}/taskflow-web:${IMAGE_TAG:-latest}
    build:
      context: ./taskflow-web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL requis}
    pull_policy: ${IMAGE_PULL_POLICY:-build}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes: []
    ports:
      - "127.0.0.1:${WEB_PUBLISH_PORT:-4000}:3000"
    restart: always
