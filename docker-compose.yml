# ============================================================================
# TaskFlow — Compose de base (dev local, Portainer prod/preprod via overlays)
# Ports : Web 4000 · API 4001 · DB 4002
# Dev local : docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================================

services:
  taskflow-api:
    build:
      context: ./taskflow-api
      dockerfile: Dockerfile
    container_name: taskflow-api
    ports:
      - "4001:8000"
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-taskflow}:${POSTGRES_PASSWORD:-taskflow123}@taskflow-db:5432/${POSTGRES_DB:-taskflow_adhd}
      SECRET_KEY: ${SECRET_KEY:-taskflow-adhd-secret-key-2025}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4000,http://taskflow-web:3000}
    volumes:
      - taskflow_api_data:/app/data
    networks:
      - taskflow-network
    depends_on:
      taskflow-db:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  taskflow-web:
    build:
      context: ./taskflow-web
      dockerfile: Dockerfile
    container_name: taskflow-web
    ports:
      - "4000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - taskflow-network
    depends_on:
      taskflow-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  taskflow-db:
    image: postgres:15-alpine
    container_name: taskflow-db
    ports:
      - "4002:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow_adhd}
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow123}
    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data
      - ./taskflow-api/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - taskflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow_adhd}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  taskflow-network:
    name: taskflow-network
    driver: bridge

volumes:
  taskflow_postgres_data:
    name: taskflow_postgres_data
  taskflow_api_data:
    name: taskflow_api_data
